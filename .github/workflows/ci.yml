name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust Tests & Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test --workspace --exclude olayer-desktop-demo

      - name: Run Clippy
        run: cargo clippy --workspace --exclude olayer-desktop-demo --all-targets

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build WASM package
        working-directory: sdk/ts/wasm
        run: wasm-pack build --target web

  typescript:
    name: TypeScript SDK Tests
    runs-on: ubuntu-latest
    needs: wasm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build WASM package
        working-directory: sdk/ts/wasm
        run: wasm-pack build --target web

      - name: Install TypeScript SDK dependencies
        working-directory: sdk/ts
        run: npm install

      - name: Run TypeScript tests
        working-directory: sdk/ts
        run: npm run test:run
