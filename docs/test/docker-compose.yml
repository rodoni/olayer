version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: olayer_postgis
    environment:
      - POSTGRES_DB=olayer
      - POSTGRES_USER=olayer
      - POSTGRES_PASSWORD=olayer_gis_secure
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olayer -d olayer"]
      interval: 10s
      timeout: 5s
      retries: 5

  geoserver:
    image: kartoza/geoserver:2.24.1
    container_name: olayer_geoserver
    environment:
      - GEOSERVER_ADMIN_USER=admin
      - GEOSERVER_ADMIN_PASSWORD=geoserver
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=olayer
      - POSTGRES_USER=olayer
      - POSTGRES_PASS=olayer_gis_secure
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
    restart: always

volumes:
  postgis_data:
    driver: local
  geoserver_data:
    driver: local
